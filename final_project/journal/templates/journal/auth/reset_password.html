{% extends 'journal/base.html' %}
{% block title %}Жаңа құпиясөз | StudentSpace{% endblock %}{% block auth_content %}<div class="auth-card medium"><h1>Жаңа құпиясөз</h1><p class="subtitle">Жаңа құпиясөз орнатыңыз</p><form method="post" class="form-stack">{% csrf_token %}<label>Жаңа құпиясөз</label>{{ form.password1 }}<label>Қайта енгізіңіз</label>{{ form.password2 }}{% if form.errors %}<div class="form-errors">{{ form.errors }}</div>{% endif %}<div class="auth-actions spread"><a href="{% url 'verify_code' %}" class="outline-button wide">Артқа</a><button class="primary-button" type="submit">Сақтау</button></div></form></div>{% endblock %}
