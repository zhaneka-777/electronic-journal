{% extends 'journal/base.html' %}
{% block title %}Кодты растау | StudentSpace{% endblock %}{% block auth_content %}<div class="auth-card medium"><h1>Кодты енгізіңіз</h1><p class="subtitle">Email-ге келген 6 таңбалы кодты жазыңыз</p><form method="post" class="form-stack">{% csrf_token %}<label>Код (6 сан)</label>{{ form.code }}{% if code_hint %}<div class="code-hint">Код жіберілді: {{ code_hint }}</div>{% endif %}<div class="auth-actions spread"><a href="{% url 'forgot_password' %}" class="outline-button wide">Артқа</a><button class="primary-button" type="submit">Сақтау</button></div></form></div>{% endblock %}
